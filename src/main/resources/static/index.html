<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 단어 학습</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header class="app-header">
    <h1>📖 영어 단어 학습</h1>
  </header>

  <section id="level-select" class="screen">
    <p class="subtitle">학습할 레벨을 선택하세요</p>
    <div id="level-list" class="level-list"></div>
  </section>

  <section id="study-screen" class="screen" hidden>
    <div class="progress-row">
      <span id="progress-text">0 / 0</span>
      <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="card">
      <div id="word-en" class="word-en">-</div>
      <div id="word-ko" class="word-ko hidden-meaning">-</div>
    </div>

    <div class="controls">
      <button id="btn-prev" title="이전 단어">⏮</button>
      <button id="btn-play" title="일시정지/재생">⏸</button>
      <button id="btn-next" title="다음 단어">⏭</button>
      <button id="btn-exit" title="레벨 선택으로">종료</button>
    </div>

    <div class="interval-control">
      <label for="interval">다음 단어까지 대기 시간: <span id="interval-value">4</span>초</label>
      <input type="range" id="interval" min="2" max="10" step="1" value="4">
    </div>
  </section>

  <section id="done-screen" class="screen" hidden>
    <p class="subtitle">🎉 이 레벨의 단어를 모두 학습했어요!</p>
    <div class="controls">
      <button id="btn-repeat">다시 학습하기</button>
      <button id="btn-back">레벨 선택으로</button>
    </div>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
